name: Build VERA Pulse APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Grant execute permission
      run: chmod +x ./VERA-Pulse/gradlew
    - name: Build debug APK
      working-directory: ./VERA-Pulse
      run: ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: vera-pulse-debug
        path: VERA-Pulse/app/build/outputs/apk/debug/app-debug.apk
