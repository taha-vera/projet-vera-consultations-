name: Build VERA Pulse APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build APK
      run: |
        cd VERA-Pulse
        chmod +x gradlew
        ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: vera-pulse-apk
        path: VERA-Pulse/app/build/outputs/apk/debug/
