name: Build VERA Pulse APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        local-cache: true

    - name: Build vera_core (Rust ARM64)
      env:
        NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        cd vera_core
        cargo build --release --target aarch64-linux-android
        mkdir -p ../VERA-Pulse/app/src/main/jniLibs/arm64-v8a
        cp target/aarch64-linux-android/release/libvera_core.so \
           ../VERA-Pulse/app/src/main/jniLibs/arm64-v8a/

    - name: Build VERA Pulse APK
      run: |
        cd VERA-Pulse
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: vera-pulse-release
        path: VERA-Pulse/app/build/outputs/apk/release/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: VERA-Pulse/app/build/outputs/apk/release/*.apk
