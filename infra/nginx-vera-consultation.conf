server {
    server_name vera-consultation.duckdns.org;

    # Routes du parcours de VOTE : access_log desactive.
    # Chaque ligne de log porte IP + horodatage a la seconde. Or la demande de
    # signature (liee au jeton, donc a l'identite distribuee par le RH) et le
    # depot du vote sont deux requetes du meme client a quelques secondes
    # d'intervalle : les logs suffisent a relier identite et vote sans toucher
    # a la cryptographie. La base a ete purgee de ses horodatages (P-B) ; laisser
    # Nginx les reconstituer annulerait ce travail.
    # Les autres routes (sante, pages, RH) restent loggees pour le diagnostic
    # et la detection d'abus.
    location = /api/signer_aveugle {
        access_log off;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/repondre {
        access_log off;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/vera-consultation.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vera-consultation.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = vera-consultation.duckdns.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name vera-consultation.duckdns.org;
    return 404; # managed by Certbot


}